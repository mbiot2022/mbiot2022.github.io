# Site Settings
locale                   : "pt-BR"
title                    : "Maurício Brigato"
title_separator          : "-"
name                     : &name "Maurício Brigato"
description              : &description "M.Sc. Electrical Engineering | WSN | IoT | Energy Efficiency | UNESP"
url                      : "https://mbiot2022.github.io"
baseurl                  : ""
repository               : "mbiot2022/mbiot2022.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# SEO
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

